<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overdraft Application Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="beauty.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Overdraft Application Form</h2>
        <form id="odForm" action="process_od.php" method="POST">
            <div class="mb-3">
                <label for="applicantName" class="form-label">Applicant Name</label>
                <input type="text" class="form-control" id="applicantName" name="applicantName" required>
            </div>
            <div class="mb-3">
                <label for="accountNumber" class="form-label">Account Number</label>
                <input type="text" class="form-control" id="accountNumber" name="accountNumber" required>
            </div>
            <div class="mb-3">
                <label for="branch" class="form-label">Branch</label>
                <input type="text" class="form-control" id="branch" name="branch" required>
            </div>
            <div class="mb-3">
                <label for="amountRequested" class="form-label">Amount Requested</label>
                <input type="number" class="form-control" id="amountRequested" name="amountRequested" min="0" step="0.01" required>
            </div>
            <div class="mb-3">
                <label for="purpose" class="form-label">Purpose</label>
                <textarea class="form-control" id="purpose" name="purpose" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label for="term" class="form-label">Term (Months)</label>
                <input type="number" class="form-control" id="term" name="term" min="1" required>
            </div>
            <div class="mb-3">
                <label for="security" class="form-label">Security Offered</label>
                <input type="text" class="form-control" id="security" name="security">
            </div>
            <div class="mb-3">
                <label for="date" class="form-label">Date</label>
                <input type="date" class="form-control" id="date" name="date" required>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('odForm').addEventListener('submit', function(event) {
            // Basic validation
            const amount = document.getElementById('amountRequested').value;
            if (amount <= 0) {
                alert('Amount must be greater than 0');
                event.preventDefault();
                return;
            }
            // Add more validations as needed
        });
    </script>
</body>
</html>
